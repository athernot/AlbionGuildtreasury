[build]
  publish = "."
  command = "echo 'No build step required'"

# Redirect root to login page only when index.html doesn't exist
# Auth check is handled client-side in index.html
[[redirects]]
  from = "/"
  to = "/login.html"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # unsafe-inline required for all onclick/onchange/oninput handlers in HTML
    # connect-src must include cdnjs.cloudflare.com for SW to fetch XLSX library
    # font-src allows common CDN fonts (Perplexity, Google Fonts, etc.)
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com https://r2cdn.perplexity.ai; connect-src 'self' https://cdnjs.cloudflare.com; media-src 'self'; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'self'"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

# app.js and sw.js change every release — use short cache
[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# All other .js files (none currently, but future-proof)
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
