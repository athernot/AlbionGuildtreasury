<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Login - Albion Online Guild Treasury">
<meta name="theme-color" content="#1e40af">
<title>Login — Guild Treasury</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f4f4f4;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.login-wrap{background:#fff;border:1px solid #ddd;border-radius:16px;padding:2rem;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.login-header{text-align:center;margin-bottom:1.5rem}
.login-header h1{font-size:18px;color:#1a1a1a;margin-bottom:4px}
.login-header p{font-size:12px;color:#888}
.login-form{display:flex;flex-direction:column;gap:12px}
.login-form input{padding:12px 14px;border:1px solid #ccc;border-radius:10px;font-size:14px;background:#f9f9f9;color:#1a1a1a;width:100%;transition:border-color .2s;font-family:monospace;letter-spacing:2px}
.login-form input:focus{outline:none;border-color:#1e40af;background:#fff}
.login-form button{padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s}
.login-btn{background:#1e40af;color:#fff}
.login-btn:hover{background:#1e3a8a}
.error-msg{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 12px;font-size:12px;color:#991b1b;display:none;text-align:center}
.hint{text-align:center;font-size:11px;color:#aaa;margin-top:12px}
.dark-toggle{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:20px;cursor:pointer;padding:4px 8px;border-radius:6px}
.dark-toggle:hover{background:#e0e0e0}
body.dark{background:#0f172a}
body.dark .login-wrap{background:#1e293b;border-color:#334155;box-shadow:0 4px 24px rgba(0,0,0,0.3)}
body.dark .login-header h1{color:#e2e8f0}
body.dark .login-header p{color:#94a3b8}
body.dark .login-form input{background:#0f172a;border-color:#334155;color:#e2e8f0}
body.dark .login-form input:focus{border-color:#2563eb;background:#1e293b}
body.dark .error-msg{background:#451a1a;border-color:#7f1d1d;color:#fca5a5}
body.dark .hint{color:#64748b}
body.dark .dark-toggle:hover{background:#334155}
</style>
</head>
<body>
<button class="dark-toggle" onclick="toggleDarkMode()" id="darkBtn">🌙</button>
<div class="login-wrap">
  <div class="login-header">
    <h1>🛡️ Guild Treasury</h1>
    <p>Albion Online — Balance Tracker</p>
  </div>
  <div class="error-msg" id="errorMsg"></div>
  <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
    <input type="password" id="loginPassword" placeholder="Masukkan password" autocomplete="current-password" required>
    <button type="submit" class="login-btn">🔓 Masuk</button>
  </form>
  <button class="setup-btn" style="width:100%;margin-top:12px" onclick="showSetup()">🔐 Set Password (pertama kali)</button>
  <p class="hint">Password tersimpan di browser Anda (SHA-256 hashed)</p>
</div>

<script>
const STORAGE_KEY = 'treasuryPassword';

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = '❌ ' + msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}

function showSuccess(msg) {
  const el = document.getElementById('successMsg');
  el.textContent = '✅ ' + msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}

async function hashPassword(str) {
  const encoder = new TextEncoder();
  const data = encoder.encode(str);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function handleLogin(e) {
  e.preventDefault();
  const pw = document.getElementById('loginPassword').value;
  if (!pw) return showError('Password tidak boleh kosong!');

  const saved = localStorage.getItem(STORAGE_KEY);
  if (!saved) {
    showError('Belum ada password. Klik "Set Password" terlebih dahulu.');
    return;
  }

  const inputHash = await hashPassword(pw);
  if (inputHash === saved) {
    sessionStorage.setItem('treasuryLoggedIn', '1');
    window.location.href = './index.html';
  } else {
    showError('Password salah!');
    document.getElementById('loginPassword').value = '';
  }
}

function showSetup() {
  const wrap = document.querySelector('.login-wrap');
  wrap.innerHTML = `
    <div class="login-header">
      <h1>🔐 Set Password</h1>
      <p>Buat password untuk melindungi data Anda</p>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <form class="login-form" onsubmit="handleSetup(event)">
      <input type="password" id="setupPw" placeholder="Password baru" required>
      <input type="password" id="confirmPw" placeholder="Konfirmasi password" required>
      <button type="submit" class="login-btn">💾 Simpan Password</button>
    </form>
    <button class="setup-btn" style="width:100%;margin-top:12px" onclick="window.location.reload()">← Kembali ke Login</button>
  `;
}

async function handleSetup(e) {
  e.preventDefault();
  const pw = document.getElementById('setupPw').value;
  const confirm = document.getElementById('confirmPw').value;

  if (!pw) return showError('Password tidak boleh kosong!');
  if (pw.length < 4) return showError('Password minimal 4 karakter!');
  if (pw !== confirm) return showError('Password tidak cocok!');

  const hash = await hashPassword(pw);
  localStorage.setItem(STORAGE_KEY, hash);
  sessionStorage.setItem('treasuryLoggedIn', '1');
  window.location.href = './index.html';
}

function toggleDarkMode() {
  document.body.classList.toggle('dark');
  const isDark = document.body.classList.contains('dark');
  localStorage.setItem('darkMode', isDark ? '1' : '0');
  document.getElementById('darkBtn').textContent = isDark ? '☀️' : '🌙';
}

if (localStorage.getItem('darkMode') === '1') {
  document.body.classList.add('dark');
  document.getElementById('darkBtn').textContent = '☀️';
}

if (sessionStorage.getItem('treasuryLoggedIn') === '1') {
  window.location.href = './index.html';
}

document.getElementById('loginPassword').focus();
</script>
</body>
</html>
