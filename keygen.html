<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Key Generator - Guild Treasury">
<meta name="theme-color" content="#1e40af">
<title>Key Generator — Guild Treasury</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f4f4f4;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.wrap{background:#fff;border:1px solid #ddd;border-radius:16px;padding:2rem;width:100%;max-width:460px;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
h1{font-size:18px;text-align:center;margin-bottom:4px;color:#1a1a1a}
.sub{text-align:center;font-size:12px;color:#888;margin-bottom:1.5rem}
.form-group{display:flex;flex-direction:column;gap:12px}
.form-group input{padding:12px 14px;border:1px solid #ccc;border-radius:10px;font-size:14px;background:#f9f9f9;color:#1a1a1a;width:100%;font-family:monospace;letter-spacing:2px}
.form-group input:focus{outline:none;border-color:#1e40af;background:#fff}
.form-group button{padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s}
.gen-btn{background:#15803d;color:#fff}
.gen-btn:hover{background:#166534}
.result-box{background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:16px;margin-top:16px;text-align:center;display:none}
.result-box label{font-size:11px;color:#64748b;display:block;margin-bottom:6px}
.result-box code{font-size:18px;font-weight:700;color:#15803d;letter-spacing:2px;word-break:break-all;user-select:all;display:block;margin-bottom:8px}
.result-box button{background:#1e40af;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer;font-weight:600}
.result-box button:hover{background:#1e3a8a}
.hint{text-align:center;font-size:11px;color:#aaa;margin-top:12px}
.back-link{text-align:center;margin-top:16px}
.back-link a{color:#1e40af;font-size:13px;text-decoration:none}
.back-link a:hover{text-decoration:underline}
body.dark{background:#0f172a}
body.dark .wrap{background:#1e293b;border-color:#334155}
body.dark h1{color:#e2e8f0}
body.dark .sub,body.dark .hint{color:#94a3b8}
body.dark .form-group input{background:#0f172a;border-color:#334155;color:#e2e8f0}
body.dark .form-group input:focus{border-color:#2563eb}
body.dark .result-box{background:#14532d;border-color:#16a34a}
body.dark .result-box label{color:#94a3b8}
body.dark .result-box code{color:#86efac}
body.dark .back-link a{color:#93c5fd}
</style>
</head>
<body>
<div class="wrap">
  <h1>🔑 Key Generator</h1>
  <p class="sub">Guild Treasury — Developer Tool</p>

  <div class="form-group">
    <input type="text" id="deviceIdInput" placeholder="Paste Device ID dari user (misal: A1B2C3D4-E5F6G7H8-I9J0K1L2)" autocomplete="off">
    <button class="gen-btn" onclick="generateKey()">⚡ Generate License Key</button>
  </div>

  <div class="result-box" id="resultBox">
    <label>License Key yang di-generate:</label>
    <code id="generatedKey"></code>
    <button onclick="copyKey()">📋 Copy Key</button>
  </div>

  <p class="hint">Key ini hanya bisa dipakai di device dengan Device ID yang sama.</p>
  <div class="back-link"><a href="./login.html">← Kembali ke Login</a></div>
</div>

<script>
async function hashKey(str) {
  const encoder = new TextEncoder();
  const data = encoder.encode(str);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function generateKey() {
  const deviceId = document.getElementById('deviceIdInput').value.trim().toUpperCase();
  if (!deviceId) return alert('Masukkan Device ID terlebih dahulu!');

  const secret = 'AlbionGuildTreasury2026!@#$';
  const raw = deviceId.replace(/-/g, '') + secret;
  const hash = await hashKey(raw);
  const key = hash.substring(0, 8).toUpperCase() + '-' + hash.substring(8, 16).toUpperCase() + '-' + hash.substring(16, 24).toUpperCase();

  document.getElementById('generatedKey').textContent = key;
  document.getElementById('resultBox').style.display = 'block';
}

function copyKey() {
  const key = document.getElementById('generatedKey').textContent;
  navigator.clipboard.writeText(key).then(() => {
    alert('✅ Key berhasil disalin!');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = key;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('✅ Key berhasil disalin!');
  });
}

document.getElementById('deviceIdInput').focus();
</script>
</body>
</html>
